security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        api:
            pattern: ^/api/login$
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: api_login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            jwt: ~
        main:
            lazy: true
            provider: app_user_provider
            entry_point: form_login
            jwt: ~
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_dashboard
                username_parameter: _username
                password_parameter: _password
                enable_csrf: true
            logout:
                path: app_logout
                target: app_home
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800

    access_control:
        - { path: ^/admin,              roles: ROLE_ADMIN }
        - { path: ^/api/login,          roles: PUBLIC_ACCESS }
        - { path: ^/api,                roles: ROLE_USER }
        - { path: ^/login,              roles: PUBLIC_ACCESS }
        - { path: ^/register,           roles: PUBLIC_ACCESS }
        - { path: ^/$,                  roles: PUBLIC_ACCESS }
        - { path: ^/mentions-legales,   roles: PUBLIC_ACCESS }
        - { path: ^/confidentialite,    roles: PUBLIC_ACCESS }
        - { path: ^/contact,                       roles: PUBLIC_ACCESS }
        - { path: ^/mot-de-passe-oublie,           roles: PUBLIC_ACCESS }
        - { path: ^/reinitialiser-mot-de-passe,    roles: PUBLIC_ACCESS }
        - { path: ^/,                   roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
